parameters:
- name: verbosity
  displayName: Verbosity
  type: string
  default: minimal
  values:
  - minimal
  - normal
  - detailed
  - diagnostic

trigger: none

pool:
  vmImage: 'windows-latest'

variables:
  configuration: 'Release'
  assemblyVersion: '$(AppVersionMajor).0.0.0'
  semanticVersion: '$(AppVersionMajor).$(AppVersionMinor).$(AppVersionPatch)'

steps:
- task: PowerShell@2
  displayName: 'Set variables'
  inputs:
    targetType: 'inline'
    script: |
      $versionSuffix = "$(AppVersionSuffix)"
      if ($versionSuffix -match "\S") { $versionSuffix = "-$versionSuffix" }
      Write-Host "##vso[task.setvariable variable=versionSuffix;]$versionSuffix"
      Write-Host "VersionSuffix $versionSuffix"
      $packageVersion = "$(semanticVersion)$versionSuffix"
      if ("$(isReleaseBuild)" -ne "true") { $packageVersion += "-CI-$(Build.BuildNumber)" }
      Write-Host "Set PackageVersion and BuildNumber to '$packageVersion'"
      Write-Host "##vso[task.setvariable variable=packageVersion;]$packageVersion"
      Write-Host "##vso[build.updatebuildnumber]$packageVersion"
- task: DownloadSecureFile@1
  name: signKey
  displayName: 'Download sign key'
  inputs:
    secureFile: 'DaxTemplate.snk'
- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: sdk
    useGlobalJson: true
- task: DotNetCoreCLI@2
  displayName: '.NET restore'
  inputs:
    command: 'restore'
    projects: 'src/**/*.csproj'
    feedsToUse: 'select'
    verbosityRestore: '${{ parameters.verbosity }}'
- task: DotNetCoreCLI@2
  # Phase M / Stage 1 step 1C: CI-only warnings-as-errors, mirroring .github/workflows/ci.yml.
  # The matching WarningsNotAsErrors allowlist (Stage-2 deferred debt) lives in
  # src/Directory.Build.props so both pipelines share one source of truth.
  displayName: '.NET build'
  inputs:
    command: 'build'
    projects: 'src/**/*.csproj'
    arguments: '--configuration "$(configuration)" --no-restore --verbosity ${{ parameters.verbosity }} /p:AssemblyVersion="$(assemblyVersion)" /p:FileVersion="$(semanticVersion)" /p:VersionPrefix="$(semanticVersion)" /p:VersionSuffix="$(versionSuffix)" /p:ContinuousIntegrationBuild="true" /p:AdditionalConstants="SIGNED" /p:SignAssembly="true" /p:AssemblyOriginatorKeyFile="$(signKey.secureFilePath)" /p:TreatWarningsAsErrors=true /m'
- task: DotNetCoreCLI@2
  # Verifies the dotnet-format baseline (clean as of Stage 1B) doesn't drift.
  displayName: '.NET format check'
  inputs:
    command: 'custom'
    custom: 'format'
    arguments: 'src/Dax.Template.sln --verify-no-changes --no-restore'
- task: DotNetCoreCLI@2
  displayName: '.NET test'
  inputs:
    command: 'test'
    projects: 'src/*Tests/*.csproj'
    arguments: '--no-restore --no-build --verbosity ${{ parameters.verbosity }} --logger "trx;LogFilePrefix=testResults" --collect "Code coverage"'
- task: DotNetCoreCLI@2
  displayName: '.NET pack'
  inputs:
    command: 'pack'
    packagesToPack: 'src/Dax.Template/Dax.Template.csproj'
    nobuild: true
    versioningScheme: 'byEnvVar'
    versionEnvVar: 'packageVersion'
    verbosityPack: '${{ parameters.verbosity }}'
- task: PublishPipelineArtifact@1
  displayName: 'Publish artifacts'
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)'
    artifact: 'drop'
    publishLocation: 'pipeline'